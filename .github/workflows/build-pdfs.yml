name: Build rule PDFs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            fonts-dejavu \
            fonts-noto-core

      - name: Build PDFs
        run: |
          mkdir -p dist
          pandoc rules.en.md \
            --standalone \
            --from gfm-yaml_metadata_block+tex_math_dollars \
            --pdf-engine=xelatex \
            --metadata title="Nimora Rules" \
            --variable mainfont="DejaVu Serif" \
            --variable sansfont="DejaVu Sans" \
            --variable monofont="DejaVu Sans Mono" \
            --variable geometry:margin=20mm \
            --output dist/Nimora_en.pdf
          pandoc rules.ru.md \
            --standalone \
            --from gfm-yaml_metadata_block+tex_math_dollars \
            --pdf-engine=xelatex \
            --metadata title="Правила Nimora" \
            --variable mainfont="DejaVu Serif" \
            --variable sansfont="DejaVu Sans" \
            --variable monofont="DejaVu Sans Mono" \
            --variable geometry:margin=20mm \
            --output dist/Nimora_ru.pdf

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: nimora-rules-pdf
          path: dist/*.pdf

      - name: Upload PDFs to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pdf
