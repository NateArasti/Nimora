sub></span> — Модификатор Ловкости</li><li><span class=\"math-inline\">М<sub>Т</sub></span> — Модификатор Тела</li></ul>\n<p>Но в целом СЗ может иметь дополнительные модификаторы от брони, каких-то <strong>Эффектов</strong> или черт, в том числе сугубо ситуативных. При этом подобный просчёт является <strong><em>пассивной защитой</em></strong>. Но также Мастеру Игры крайне рекомендуется использовать <strong><em>активную защиту</em></strong> — механику, при которой степень защиты просчитывается относительно контекста ситуации. Например, если враг это фехтовальщик с рапирой, то для простого удара в тело можно использовать <strong><em>пассивную защиту</em></strong>, но если игрок хочет попасть в глаз, то <strong>СЗ</strong> стоит считать увеличенным, т.к. подобную атаку совершить куда сложнее не только с точки зрения точности <strong>Игрока</strong>, но и с точки зрения повышенности защиты противника (инстинктивно на удары в глаз будут реагировать активнее).</p>\n<h4 id=\"скорость-перемещения\">Скорость перемещения</h4>\n<p>Обозначает сколько <strong>Персонаж</strong> может пройти в течение одного <strong>Хода</strong>. По умолчанию у всех <strong>Персонажей</strong> скорость равна <strong>5 метрам</strong>, но сильно меняется от контекста игровой ситуации.</p>\n<h4 id=\"истощение\">Истощение</h4>\n<p>Степень перегруженности <strong>Персонажа</strong>. Может универсально использоваться <strong>Мастером</strong> в качестве цены за способности и различные активности, чтобы задавать цену действиям <strong>Игроков</strong> и давать стимул максимально эффективно их совершать и продумывать. Также позволяет создавать критические ситуации, в которых <strong>Персонаж</strong> ещё живой, но настолько истощён, что уже не способен действовать. <strong>Истощение</strong> накапливается численно для простоты понимания, и в зависимости от прохождения определённых числовых порогов, на <strong>Персонажа</strong> накладываются эффекты. При этом <strong>Мастер</strong> может как позволять использовать истощение в фиксированных количествах, так и позволять &quot;прикладывать больше или меньше усилий&quot;, от чего стоимость способности будет варьироваться. В таком случае, <strong>Мастеру</strong> нужно осторожно подходить к последствиям таких действий — если игрок хочет разом использовать много истощения и тем самым быстро победить, то за это нужна дополнительная цена, помимо перехода в порог. Можно представить это как выход за пределы организма. Чем больше Игрок использует, тем больше цена.</p>\n<p>Степени истощения могут зависеть от <strong>Мастера</strong> и конкретного <strong>Персонажа</strong>, но по умолчанию можно использовать следующие:</p>\n<ol start=\"0\"><li><strong>Персонаж</strong> полон сил и энергии</li><li>Помехи на <strong>Проверки</strong></li><li>Невозможно передвигаться своими силами, нет <strong>Бонусного Действия</strong></li><li><strong>Персонаж</strong> падает без сознания</li></ol>\n<p>Числовой порог может считаться по своему в каждой отдельной игре, но для общих правил предлагается использоваться следующую формулу порога истощения <span class=\"math-inline\">i</span> и отталкиваться от неё:</p>\n<div class=\"math-block\">ПорогИстощения<sub>i</sub> = (5 + max(МодификаторТела,МодификаторРазума, МодификаторВоли)) * i</div>\n<h3 id=\"смерть\">Смерть</h3>\n<p>После того, как <strong>ОЗ</strong> <strong>Персонажа</strong> опускаются до 0, он впадает в стадию &quot;при смерти&quot;. В это время он абсолютно <em>недееспособен</em>. Если ему не помочь, то он умрёт. В <strong>Бою</strong> время на <strong>Помощь</strong> ограничена 3 ходами, причем каждая атака по <strong>Персонажу</strong>, уменьшает количество <strong>Ходов</strong> для <strong>Помощи</strong>. В небоевой ситуации время ограничено 1 минутой и тут любая атака моментально заканчивает все ходы для помощи. <strong>Помощь</strong> умирающему является <strong>Действием</strong>.</p>\n<h3 id=\"черты\">Черты</h3>\n<p>Особенности <strong>Персонажа</strong>, которые определяют его сильные и слабые стороны. Должны описывать его с самых разных сторон, добавлять глубину и подталкивать игроков к отыгрышу. Напрямую влияют на весь геймплей и должны идти из истории <strong>Персонажа</strong> и его придуманной личности. Например, если <strong>Персонаж</strong> с детства рос как будущий военный и всю жизнь посвящал военному ремеслу, то у него может быть такой набор черт:</p>\n<ul><li><strong>Владение боевым оружием</strong> - A (ранг владения)</li><li><strong>Дисциплина</strong><br>Годами отточенная строгость и крепость сознания (+2 к проверкам страха)</li><li><strong>Субординация</strong><br>Не может противиться приказам вышестоящих персон (проверка воли с помехой для ослушания приказа)</li><li><strong>Черствость</strong><br>Из-за сурового детства и взросления, не обладает должной эмпатией (помеха при проверках обаяния, сочувствия и т.п.)</li></ul>\n<h3 id=\"способности\">Способности</h3>\n<p>Особые действия, которые <strong>Персонаж</strong> может совершать, чтобы сильно изменить игровую ситуацию. Являются активными умениями, которые <strong>Персонаж</strong> должен использовать при необходимости, чтобы повернуть ситуацию в нужное ему русло. Должны иметь ограничения и цену использования. При этом цена <strong>Способности</strong> должна соответствовать её мощи и освоенности <strong>Персонажа</strong> с ней. Например, если <strong>Персонаж</strong> владеет алебардой, то может спокойно ей сражаться в обычном для него виде. Но если он придумал какой-то необычный приём с ней, то его использование будет стоить какого-то количества истощения, а ранг этой способности может быть низким в зависимости от освоенности <strong>Персонажа</strong> с этим приёмом. При этом несложные и часто используемые приёмы могут не иметь никаких последствий и цены за использование.</p>\n<p>Пример способности: Рассечение сухожилий - B (+2) Персонаж производи концентрированный удар по сухожилию противника. При успехе лишает противника нормально пользоваться повреждённой конечностью. Тратит 1 Истощение и требует проверки попадания.</p>\n<p>В данном случае Персонаж неплохо владеет способностью и она не является чрезвычайно сложной, поэтому цена низкая. Также влияет то, что её результат не гарантирован.</p>\n<h3 id=\"эффекты\">Эффекты</h3>\n<p>Статусы наложенные на <strong>Персонажа</strong>. Могут быть как положительными, так и отрицательными, так и вообще нейтральными. Например, какой-то плут подсыпал слабительное в чай <strong>Персонажу</strong>, и тот выпив его имеет эффект &quot;Прикован к туалету&quot;.</p>\n<h4 id=\"оболочки\">Оболочки</h4>\n<p>Опциональная механика. Во многих сеттингах и игровых системах есть те или иные формы &quot;оболочки&quot;. Это может быть полноразмерная броня, дополнительное временное здоровье или банальный магический щит вокруг персонажа. Подобные элементы можно описать как оболочки, которые являются дополнительным слоем здоровья персонажа. Простыми словами: чтобы начать наносить урон персонажу с непробиваемой бронёй, нужно сначала сломать эту броню, т.е. оболочку. Такие оболочки могут также делиться на типы: если у вас мир магии, то оболочки могут защищать только от магического или только от физического урона. В психологических сеттингах это может быть оболочка психики, после разрушения которой персонаж сходит с ума и погибает. Ну и конечно, могут быть оболочки в целом дарующие временную дополнительную защиту/здоровье.</p>\n<h3 id=\"предметы\">Предметы</h3>\n<p><strong>Предметы</strong> также могут иметь ранги. Ранг описывает качество, мощность, редкость, удобство или степень освоенности вещи <strong>Персонажем</strong>. Это позволяет быстро понимать, насколько предмет хорош, без длинного списка чисел.</p>\n<p>Например:</p>\n<ul><li>ржавая сабля может иметь ранг <strong>D</strong> и давать помеху при сложных фехтовальных действиях</li><li>хорошая армейская рапира может иметь ранг <strong>B</strong> и считаться надёжным оружием без дополнительных штрафов</li><li>легендарный клинок может иметь ранг <strong>A</strong> или <strong>S</strong>, давать бонус к проверкам, пробивать особые <strong>Оболочки</strong> или открывать отдельную <strong>Способность</strong></li></ul>\n<h3 id=\"инвентарь\">Инвентарь</h3>\n<p><strong>Предметы</strong>, имеющиеся в распоряжении <strong>Персонажа</strong> и его быстром доступе. <strong>Мастеру</strong> предлагается разрешать <strong>Игрокам</strong> держать в <strong>Инвентаре</strong> вещи до тех пор пока они могут объяснить каким именно образом они их распределяют и переносят. При этом также можно учитывать вес всего инвентаря и ограничивать <strong>Персонажей</strong> по этому, но в силу малой распространённости подобных игровых ситуации, подобное остаётся на усмотрение <strong>Мастера</strong>, а в общем случае предлагается опираться на здравый смысл.</p>\n<p>Ранг предмета не обязан всегда превращаться в прямой бонус к броску. Иногда он просто определяет, что предмет вообще способен сделать. Обычный нож не должен легко пробивать тяжёлую броню, даже если игрок хорошо бросил кубик, а артефактный молот может ломать камень без отдельной сложной проверки.</p>\n<h3 id=\"вдохновение\">Вдохновение</h3>\n<p><strong>Ресурс</strong>, который выдаёт <strong>Мастер</strong> <strong>Игроку</strong> чаще всего за хорошую игру или отыгрыш <strong>Персонажа</strong>, но в целом просто на его усмотрение (крайне рекомендую поощрять хорошие шутки!). Вдохновение можно потратить на:</p>\n<ul><li>переброс любого кубика</li><li>использование <strong>Способности</strong> <strong>Персонажа</strong> вне рамок её правил</li><li>отдать другому <strong>Персонажу</strong>, чтобы он мог его использовать, но только в моменте (то есть нельзя отдать на будущее)</li></ul>\n<p>Опционально <strong>Мастеру</strong> также предлагается использовать <strong>Анти-Вдохновение</strong>. Оно выдаётся <strong>Мастером</strong> за плохой отыгрыш или несоответствие <strong>Персонажу</strong>. Не рекомендуется злоупотреблять этим, чтобы не настраивать <strong>Игроков</strong> против себя. <strong>Мастер</strong> может в любой момент использовать это анти-вдохновение в отношении <strong>Игрока</strong>, который получил его, чтобы:</p>\n<ul><li>перебросить любой кубик</li><li>отменить использование <strong>Способности</strong> <strong>Персонажа</strong></li></ul>\n<p><strong>ВНИМАНИЕ: Стоит использовать очень аккуратно и только в случае лёгкого отношения со стороны игроков.</strong></p>\n<h2 id=\"конфликт\">Конфликт</h2>\n<p>Игровая ситуация, исход которой зависит от <strong>Проверки</strong> нескольких её участников. Успешной считается та <strong>Проверка</strong>, результат которой окажется выше других. В случае односторонней проверки, используется пассивная сложность <strong>Конфликта</strong>, которая задаётся <strong>Мастером</strong> и озвучивается перед <strong>Проверкой</strong>. При равных значениях в проверке с несколькими участниками — успешной считается <strong>Проверка</strong> защищающейся стороны.</p>\n<h3 id=\"сложность\">Сложность</h3>\n<p>Сложность <strong>Проверки</strong> определяется <strong>Мастером</strong> в зависимости от игровой ситуации, сложившейся в момент перед проверкой. Она исчисляется конкретным числом. Чем проще и удобнее <strong>Персонажу</strong> победить в конфликте, тем меньше значение сложности. В не одностороннем конфликте, чаще всего происходит прямое столкновение характеристик, но для подчеркивания чьего-то преимущества или обратного, <strong>Мастер</strong> может добавлять собственные модификаторы на результаты отдельных <strong>Персонажей</strong>. Такой модификатор не может превышать по абсолютному значению максимальное значение модификатора характеристики. В общем определении, сложность формируется из контекста ситуации и является ключом к создании напряжения и интересных игровых ситуаций со стороны <strong>Мастера</strong>, поэтому может быть сформирована максимально гибко.</p>\n<h3 id=\"проверка\">Проверка</h3>\n<p>Если не сказано обратного, то в <strong>Проверках</strong> обычно кидается кубик d20 и к его значению прибавляется модификатор соответствующей <strong>Характеристики</strong> и результат используется для определения победителя <strong>Конфликта</strong>. Бросок игровых кубиков, от результата которого зависит развитие игровой ситуации. Формула проверки:</p>\n<div class=\"math-block\">1d20 + МодификаторХарактеристики + ДопМодификаторы ≥ Сложность</div>\n<h3 id=\"критическая-удача-и-неудача\">Критическая удача и неудача</h3>\n<p>Критическая удача превращает любую <strong>Проверку</strong> в успешную, независимо от модификаторов и сложности. Критическая неудача делает обратное. По умолчанию критическая удача происходит при выпадении 20, а неудача при выпадении 1. Эти значения могут быть изменены <strong>Чертами</strong> или <strong>Способностями</strong>. При определённых обстоятельствах критическая удача/неудача может напрямую изменять результат, чтобы создать нужный эффект особенной удачи/неудачи и добавить красок в игровую ситуацию. При этом критическая удача или неудача не обязательно должны приводить к автоматическому успеху в действии или, наоборот, смертельному повороту. Абсолютизм здесь не к месту, и любые последствия должны заметно выделять результат, но не позволять совершать абсурдное. Последствия должны характеризоваться как &quot;маленькое чудо&quot; или &quot;крупно не повезло&quot;.</p>\n<h3 id=\"преимущества-и-помехи\">Преимущества и помехи</h3>\n<p>В игровой ситуации, чтобы напрямую передать преимущество какого-то <strong>Персонажа</strong> используется <strong>Преимущество</strong>. При нём, <strong>Персонаж</strong> должен пройти проверку 2 раза и выбрать лучший результат из 2. При <strong>Помехе</strong>, наоборот, нужно выбрать худший из 2 результатов. Критическая удача перебивает любую помеху, а Критическая неудача перебивает любое преимущество. Наложения помех и преимуществ можно разрешать на усмотрение <strong>Мастера</strong>, но рекомендуется не складывать, а именно выбирать суммарное состояние. При этом не может быть тройной и более помехи или преимущества. Такие проверки стоит ограничивать максимумом в 2 кубика при любом раскладе (за исключением особых черт или способностей).</p>\n<h2 id=\"бой\">Бой</h2>\n<p><strong>Бой</strong> делится на <strong>Раунды</strong>, каждый из которых состоит из <strong>Ходов</strong> каждого участвующего <strong>Персонажа</strong>.</p>\n<h3 id=\"инициатива\">Инициатива</h3>\n<p>Перед началом <strong>Боя</strong> (и при вступлении в него), все его участники должны пройти проверку инициативы (от <strong>Ловкости</strong>), которая определяет порядок <strong>Хода</strong>. При равенстве значений, <strong>Персонажи</strong> совершают повторный бросок, чтобы определить порядок <strong>Хода</strong> между собой, либо ходят на своё усмотрение или усмотрение <strong>Мастера</strong>.</p>\n<h3 id=\"ходы\">Ходы</h3>\n<p>Вся боевая ситуация разделена на <strong>Ходы</strong>, каждый из которых предоставлен отдельному <strong>Персонажу</strong>. <strong>Персонажи</strong> могут откладывать свой ход в конец раунда. <strong>Персонажи</strong>-союзники у которых ходы идут подряд, могут действовать сообща. Каждый <strong>Ход</strong> стоит считать что длится примерно 6 секунд игрового времени.</p>\n<p>Если игроки слишком много думают над своим ходом, стоит их подгонять нарративно и на крайний случай физически ограничивать время хода. Тем не менее наилучшим вариантом будет добавление <strong><em>&quot;замешательства&quot;</em></strong> — если игрок долгое время не может совершить ход, то он считается замешкавшимся и пропускает свой ход. Подобное можно легко отыграть и заметно добавить в нарративе. Но подобный эффект также должен относиться и к <strong>Мастеру</strong>.</p>\n<h3 id=\"зоны\">Зоны</h3>\n<p>Вся территория боя, поделена на зоны, внутри которых <strong>Персонаж</strong> может спокойно перемещаться. Для перемещения дальше текущей зоны тратится запас перемещения. Обычно поле делится на клетки (каждая клетка 1м) и персонажи имеют скорость в условные 5м. Таким образом персонажи могут пройти 5 клеток за ход. Но это лишь пример, и конкретные системы передвижения зависят от сеттинга в целом и от конкретной местности/сцены в частности.</p>\n<h3 id=\"действия\">Действия</h3>\n<p>По умолчанию, <strong>Персонаж</strong> может совершить только 1 действие и 1 <strong>Бонусное Действие</strong> за ход, не считая перемещения. Тем не менее, <strong>Черты</strong> или <strong>Способности</strong> могут менять это ограничение. Действия должны укладываться во временные рамки хода и быть возможными к совершению. Примеры действия:</p>\n<ol><li><strong>Атака</strong><br>Нанести урон противнику, переместить его, травмировать и т.п.</li><li><strong>Изучение</strong> / <strong>Анализ</strong><br>Получить полезную информацию о пространстве, персонажах, предметах и т.п.</li><li><strong>Влияние</strong><br>Воздействовать на поведение другого <strong>Персонажа</strong>, не совершая физической атаки.</li><li><strong>Поиск</strong><br>Обнаружить скрытые вещи и т.п.</li><li><strong>Сопротивление</strong><br>Попробовать избавиться от <strong>Эффекта</strong> или сопротивляться его воздействию.</li><li><strong>Подготовка</strong><br>Подготовить какое-то более масштабное и длительное действие на следующий ход. Также может давать <strong>Преимущество</strong> на действие в следующем ходу (например прицеливание).</li><li><strong>Командное действие</strong><br>Действие, в котором вы можете объединить свой <strong>Ход</strong> с <strong>Ходом</strong> другого <strong>Персонажа</strong>. При этом хода <strong>Персонажей</strong> не должны быть разделены ходами противников.</li><li><strong>Взаимодействие</strong><br>Любое из не перечисленных действий в списке.</li></ol>\n<p>При этом каждое из этих действий, если оно может быть выполнено в течение игрового момента (условной секунды), можно произвести за счёт <strong>Бонусного Действия</strong>.</p>\n<h3 id=\"реакции\">Реакции</h3>\n<p>В чужой ход <strong>Персонаж</strong> может только совершать <strong>Реакции</strong> — защищаться от <strong>Атак</strong> по области, наложения <strong>Эффектов</strong> и прочего взаимодействия с ним самим или окружением рядом. При этом <strong>Реакция</strong> должна укладывать в такие же рамки, что и <strong>Бонусное Действие</strong>. За <strong>Раунд</strong> по умолчанию можно совершить только 1 <strong>Реакцию</strong>. Что может быть конкретно совершенно в рамках Реакции определяется Мастером, а Игроки могут лишь пробовать доказать их возможность совершить то или иное действие.</p>\n<h2 id=\"отдых\">Отдых</h2>\n<p>В течение игры или целой кампании, <strong>Игрокам</strong> нужно совершать отдыхи. <strong>Короткие отдыхи</strong> чаще всего инициируют сами игроки, в то время как <strong>Долгие</strong> происходят чаще всего только между партиями.</p>\n<h3 id=\"короткий-отдых\">Короткий отдых</h3>\n<p>Во время <strong>Короткого отдыха</strong> <strong>Ресурсы</strong> восстанавливаются частично и относительно времени потраченного на отдых, вплоть до половины от максимальных значений.</p>\n<h3 id=\"долгий-отдых\">Долгий отдых</h3>\n<p>Во время <strong>Длительного отдых</strong>, восстанавливаются все <strong>Ресурсы</strong>, и сбрасываются все <strong>Эффекты</strong> и <strong>Истощение</strong>, если про них не сказано обратного. Чаще всего, длительный отдых автоматически происходит между сессиями игр.</p>","headings":[{"level":2,"text":"Мастер и Игрок","id":"мастер-и-игрок"},{"level":2,"text":"Ранги","id":"ранги"},{"level":2,"text":"Персонаж","id":"персонаж"},{"level":3,"text":"Характеристики","id":"характеристики"},{"level":3,"text":"Ранг Персонажа","id":"ранг-персонажа"},{"level":3,"text":"Статы","id":"статы"},{"level":4,"text":"Очки Здоровья (ОЗ)","id":"очки-здоровья-оз"},{"level":4,"text":"Степень Защиты (СЗ)","id":"степень-защиты-сз"},{"level":4,"text":"Скорость перемещения","id":"скорость-перемещения"},{"level":4,"text":"Истощение","id":"истощение"},{"level":3,"text":"Смерть","id":"смерть"},{"level":3,"text":"Черты","id":"черты"},{"level":3,"text":"Способности","id":"способности"},{"level":3,"text":"Эффекты","id":"эффекты"},{"level":4,"text":"Оболочки","id":"оболочки"},{"level":3,"text":"Предметы","id":"предметы"},{"level":3,"text":"Инвентарь","id":"инвентарь"},{"level":3,"text":"Вдохновение","id":"вдохновение"},{"level":2,"text":"Конфликт","id":"конфликт"},{"level":3,"text":"Сложность","id":"сложность"},{"level":3,"text":"Проверка","id":"проверка"},{"level":3,"text":"Критическая удача и неудача","id":"критическая-удача-и-неудача"},{"level":3,"text":"Преимущества и помехи","id":"преимущества-и-помехи"},{"level":2,"text":"Бой","id":"бой"},{"level":3,"text":"Инициатива","id":"инициатива"},{"level":3,"text":"Ходы","id":"ходы"},{"level":3,"text":"Зоны","id":"зоны"},{"level":3,"text":"Действия","id":"действия"},{"level":3,"text":"Реакции","id":"реакции"},{"level":2,"text":"Отдых","id":"отдых"},{"level":3,"text":"Короткий отдых","id":"короткий-отдых"},{"level":3,"text":"Долгий отдых","id":"долгий-отдых"}]},{"title":"Для игрока","source":"rules","key":"rules:для-игрока","slug":"для-игрока","type":"doc","html":"<h1 id=\"для-игрока\">Для игрока</h1>\n<h2 id=\"создание-персонажа\">Создание персонажа</h2>\n<p>Игрок начинает с создания своего <strong>Персонажа</strong>. Ему нужно определить кем он хочет быть в приключении и понять что он сможет делать в игре. Весь путь создания стоит сопровождать обсуждением с <strong>Мастером</strong>, чтобы ваш персонаж гармонично вписывался в общую картину игры.</p>\n<h3 id=\"идея\">Идея</h3>\n<p>Для начала вам стоит придумать идею персонажа, описать примерные желания, цели и возможности персонажа. Они должны вписываться в сеттинг, который предоставляет <strong>Мастер</strong>.</p>\n<h3 id=\"история\">История</h3>\n<p>После утверждения идеи, нужно прописать предысторию <strong>Персонажа</strong>, чтобы были нарративные обоснования вашей идеи. Степень проработки зависит от распределения ответственности в вашей игре — вы можете лишь сделать наброски истории и попросить <strong>Мастера</strong> дописать всё остальное, а можете углубиться и прописать самому, чтобы <strong>Мастеру</strong> нужно было лишь внести корректировки по необходимости.</p>\n<h3 id=\"механики\">Механики</h3>\n<p>На основе вашей идеи и геймплейных систем мастер вместе с вами должен прописать механики вашего персонажа:</p>\n<ul><li>Харакетристики</li><li>Черты</li><li>Способности</li></ul>\n<h3 id=\"снаряжение\">Снаряжение</h3>\n<p>Скорее всего, ваш персонаж появляется в игре не с пустыми руками, поэтому вам также стоит продумать какой инвентарь у вас может быть на момент начала партии. Также как и с историей, здесь можно как продумывать самому, так и полностью отдать на откуп <strong>Мастеру</strong> (никакой жалости).</p>\n<h2 id=\"прокачка\">Прокачка</h2>\n<p><strong>Прокачка</strong> <strong>Персонажей</strong> происходит по нескольким аспектам:</p>\n<ul><li>Изменение <strong>Характеристик</strong><br>Со временем <strong>Персонажи</strong> могут становиться лучше в тех или иных аспектах, из-за чего их <strong>Характеристик</strong> могут меняться. При этом если она забивают на какие-то аспекты, то <strong>Характеристики</strong> могут падать.</li><li>Увеличение выживаемости<br>Со временем <strong>Персонажи</strong> могут проходить серьёзные испытания, крепнуть и за это <strong>Мастер Игры</strong> может награждать их увеличением <strong>ОЗ</strong>, улучшением <strong>Кости Здоровья</strong>, новой защитной <strong>Чертой</strong> или более сильной <strong>Оболочкой</strong>.</li><li><strong>Черты</strong> и <strong>Способности</strong><br>Во время приключений <strong>Персонажи</strong> могут меняться, проходить различные трансформации или банально осваиваться с каким-то вещами. Из-за этого они могут получать новые черты и способности, увеличивать ранги способностей и черт и т.п.</li><li>Получение новых <strong>Предметов</strong><br>Не менее важным аспектом прокачки является получение различных <strong>Предметов</strong>. <strong>Мастеру Игры</strong> не стоит скупиться на предоставление <strong>Игрокам</strong> возможностей в получении <strong>Предметов</strong> не только общего назначения, но и уникальных артефактов, иногда даже легендарных.</li></ul>\n<h2 id=\"отыгрыш\">Отыгрыш</h2>\n<p>Наверное одним из наиболее важных элементов является отыгрыш персонажа. Даже если вы играете с наибольшим упором на бои, отыгрыш важен везде. Ведь он не только является драматическим элементом, но и основным мостом к погружению в игру и придания ей глубины, смысла и банального веселья. Любая интеракция, любое столкновение или даже небольшой переброс словами может стать в разы привлекательнее если его отыгрывать. Если вам страшно, что вас не поддержат, то знайте, что только после того, как кто-то треснет лёд, он сможет разрушиться и всем станет куда легче также, может не сразу, но понемногу, погружаться, играть не только в кубики, но и в роли (всё таки это РОЛЕВАЯ игра).</p>\n<p>Несколько приёмов, как можно упростить себе отыгрыш:</p>\n<ul><li>Продумайте какой голос у вашего персонажа. Как он может меняться в зависимости от ситуации, какие интонации ваш персонаж может чаще всего использовать.</li><li>Продумайте мимику вашего персонажа, как бы он реагировал на грусть, радость, раздражение и т.д.</li><li>Прочувствуйте историю вашего персонажа — если она небольшая, то додумывайте мелкие детали, фантазируйте.</li></ul>","headings":[{"level":2,"text":"Создание персонажа","id":"создание-персонажа"},{"level":3,"text":"Идея","id":"идея"},{"level":3,"text":"История","id":"история"},{"level":3,"text":"Механики","id":"механики"},{"level":3,"text":"Снаряжение","id":"снаряжение"},{"level":2,"text":"Прокачка","id":"прокачка"},{"level":2,"text":"Отыгрыш","id":"отыгрыш"}]},{"title":"Для мастера","source":"rules","key":"rules:для-мастера","slug":"для-мастера","type":"doc","html":"<h1 id=\"для-мастера\">Для мастера</h1>\n<h2 id=\"сопровождение-игроков\">Сопровождение Игроков</h2>\n<p>На протяжении подготовки к партии вам стоит оказывать всяческое содействие и помощь вашим <strong>Игрокам</strong>, чтобы им было комфортно и они не были обескуражены количеством лора или механик. Старайтесь упростить им жизнь, но в то же время не ограничивайте их в желаниях. Даже если они хотят обладать божественными силами — позвольте им иметь крупицу этих возможностей и дайте им задаток на то, что в игре они смогут развиться и получить желанную силу. Разные люди по-разному могут относиться к отдельным аспектам игры, поэтому всегда стоит искать индивидуальный подход и создавать комфортную среду вокруг самой игры (внутри правила уже другие...).</p>\n<p>Такое же сопровождение стоит оказывать и уже во время партии (между сессиями), обсуждать с игроками, что им нравится, что не нравится, рассуждать на темы, которые их интересуют и фантазировать с ними на тему будущего их персонажей.</p>\n<h2 id=\"история\">История</h2>\n<p>Скорее всего, первое, с чего вы начнёте подготовку к партии, — придумывание истории и персонажей. Продумывание и подготовка игры может быть очень долгим и трудоёмким процессом, но оно того стоит. Перед началом продумайте сеттинг, сюжеты и персонажей. Продумайте их переплетения, возможные ходы сюжета и всё это запишите и структурируйте, чтобы проще было потом возвращаться. Вам необязательно придумывать всё с нуля — адаптируйте уже существующие истории, миры или персонажей. Также крайне рекомендуется продумать, <strong><em>какую</em></strong> историю вы хотите рассказать и какие есть варианты её завершения. Не стоит оттягивать продумывание финала до последнего момента. Хотя бы в общих чертах, но описать каркас истории стоит до начала игр. Но и сразу пытаться прописать все детали тоже не стоит, ведь велика вероятность отправить это всё в топку из-за того, что игроки пошли по своему пути, который не был задуман вами.</p>\n<h3 id=\"сеттинг\">Сеттинг</h3>\n<p>Для начала опишите сеттинг вашего мира. Даже если вы адаптируете уже существующий, вам нужно структурированно описать все его правила и нюансы в понятном для вас формате. На эту тему есть множество хороших материалов в интернете, так что смысла разглагольствовать тут не вижу.</p>\n<h3 id=\"сюжетная-линия\">Сюжетная линия</h3>\n<p>В написанном вами сеттинге теперь нужно выбрать сюжетную линию, которая будет развиваться. Это необязательно должен быть сюжет вашей партии. Скорее наоборот, лучше описывать события, идущие в мире: война, конец света, поиски сокровищ, спасение принцессы. Вы должны описать, что произошло в мире, чтобы понять, в какой ситуации оказываются <strong>Персонажи</strong>.</p>\n<h3 id=\"действующие-лица\">Действующие лица</h3>\n<p>Когда вы пропишите сеттинг и сюжетную линию, вам также стоит сразу прописать основные действующие лица и их мотивации. Этими лицами могут быть не только <strong>Неигровые Персонажи</strong>, но и <strong>Игровые</strong>. Заранее зная мотивации и возможности действующих лиц, куда проще будет вести сюжет и импровизировать во время партий.</p>\n<h3 id=\"локации\">Локации</h3>\n<p>Зная почти всё для истории, немаловажным остаётся описание и продумывание локаций, в которых могут происходить действия сюжета и в которых могут оказаться <strong>Игроки</strong>. Зная локации и их связи с сюжетом, вы сможете легко добавлять различные намёки на лету, и вам куда проще будет готовиться к партиям.</p>\n<h3 id=\"длительность\">Длительность</h3>\n<p>Последней, но не по значению, является осознание длительности сюжета. Вы можете не знать конкретное число, но стоит всё же прикидывать, сколько у вас есть партий, пока вы или игроки не устанут, и сколько вам при этом минимум нужно партий для завершения истории. Эти вещи помогут вам осознавать, какие масштабы вам доступны или нужны. Ограничения могут раздражать, но они бывают полезны и иногда даже делают творчество лучше.</p>\n<h2 id=\"сцены\">Сцены</h2>\n<p>Вариации и последовательности игровых событий, необходимых для перехода к следующему этапу приключения.</p>\n<h3 id=\"типы\">Типы</h3>\n<ol><li>Переговоры<br>События посвящены взаимоотношениям <strong>Персонажей</strong> и обмену информацией между ними.</li><li>Исследование<br>События посвящены поиску ресурсов и информации в процессе изучения игрового <strong>Пространства</strong>.</li><li>Бой<br>События посвящены противостоянию <strong>Персонажей</strong> с риском для их <strong>Здоровья</strong>.</li><li>Поход<br>События посвящены перемещению и преодолению препятствий внутри игрового <strong>Пространства</strong>.</li><li>Прятки<br>События посвящены перемещению по игровому <strong>Пространству</strong> с целью избежать обнаружения.</li><li>Интерлюдия<br>События, в которых <strong>Игрок</strong> принимает ограниченное участие или выступает в качестве зрителя.</li><li>Песочница<br>События посвящены свободному взаимодействию с игровым <strong>Пространством</strong>, <strong>Персонажами</strong> и <strong>Ресурсами</strong>.</li></ol>\n<h3 id=\"правила-построения-сцен\">Правила построения сцен</h3>\n<p>В каждой сцене, заранее созданной <strong>Мастером</strong> (сцены, в которые Игроки сами себя затянули не в счёт), должны быть следующие элементы:</p>\n<ul><li><strong>Описание</strong><br>У каждой сцены должно быть описание. Нет нужды полностью расписывать игрокам каждый миллиметр пространства, но точно стоит описывать отличные черты текущей ситуации. Застоялый, тяжёлый запах в комнате с умершим или сладкий, бьющий в нос запах выпивки в таверне — яркие элементы, погружающие в атмосферу и задающие настроение всегда должны сопровождать начало сцены.</li><li><strong>Звук</strong><br>Каждая сцена имеет свой звук, и желательно, чтобы во время игры он менялся от сцены к сцене, а иногда и во время сцены, сопровождая и поддерживая историю.</li><li><strong>Эмоциональный сдвиг</strong><br>Как и в кино, если во время сцены эмоции не менялись, то эта сцена лишь растягивает время, а не добавляет удовольствия. Это не значит, что каждая сцена должна содержать драму или поворот сюжета — наоборот, сильные потрясения должны чередоваться со слабыми, чтобы поддерживать тонус игры. Добавляйте лёгкие разговоры по душам между тяжёлыми сюжетными перипетиями, позволяйте вашим игрокам расслабляться и веселиться между спасением (или уничтожением) мира.</li><li><strong>Героический момент</strong><br>В каждой сцене хотя бы один из игроков должен иметь возможность себя проявить. Тяжело создавать ситуации, где все в партии могут себя проявить, поэтому неплохо будет давать каждому из Персонажей возможность хотя бы иногда проявить себя. При этом, стоит хотя бы иногда давать возможности нескольким, а желательно и всей партии показывать командную игру.</li><li><strong>Сдвиг</strong><br>Всегда должна быть возможность поменять что-то в сцене. Либо от действий игроков либо от осознаваемых ими событий (например, таймер). Сцена должна уметь приходить в динамику, чтобы сдвигаться с места и также двигать повествование.</li><li><strong>Визуальное сопровождение</strong><br><em>опционально, но крайне рекомендуется</em><br>Не для каждой сцены можно подобрать хорошую картинку передающую полноту ситуации, но как минимум, всегда можно подобрать хотя бы отдалённое абстрактное изображение, за которое игроки смогут зацепиться глазом и достроить остальное на основе вашего описания.</li></ul>\n<h2 id=\"импровизация\">Импровизация</h2>\n<p>Ваши игроки с большой вероятностью будут вести себя не так, как вы рассчитывали, и поэтому вы будете оказываться в ситуациях, которые не продумывали заранее. В таких случаях наиболее корректный совет — не &quot;бороться с течением&quot;, а позволить ему вас направлять. Рассуждайте о необычных действиях <strong>Игроков</strong> как о новых возможностях. Нет нужды постоянно тянуть их на ваши рельсы сюжета, ведь их всегда можно туда вернуть, но просто более долгим путём.</p>\n<p>Тем не менее, не стесняйтесь давать игрокам взбучку (в рамках игры, конечно же), если они начинают совсем уж бездельничать и заниматься абсолютно бредовыми вещами.</p>\n<h2 id=\"баланс-и-урон\">Баланс и урон</h2>\n<p>Балансировать бои и урон сложно, особенно в свободной системе. <strong>Мастер</strong> может спокойно адаптировать оружие, броню, урон, здоровье и особенности врагов из других НРИ, если это помогает быстрее подготовить игру. Нет нужды каждый раз выстраивать новую математическую модель.</p>\n<p>Главная идея остаётся той же: простота важнее жёсткой формулы. Урон нужен не только для вычитания чисел из <strong>ОЗ</strong>, но и для того, чтобы показать, насколько хорошо <strong>Персонаж</strong> справился с ситуацией. Хорошая атака может нанести больше урона, сломать защиту, выбить оружие, сбить врага с ног или создать преимущество для союзника.</p>\n<p>При расчёте урона можно отталкиваться от рангов:</p>\n<ul><li>слабое или неподходящее оружие: <code>1d6</code> или меньше</li><li>обычное боевое оружие: <code>1d10</code></li><li>хорошее оружие или удачная ситуация: <code>2d10</code></li><li>сильная способность, тяжёлое оружие или явное преимущество: <code>3d10</code> и больше</li></ul>\n<p>Например, если <strong>Персонаж</strong> с рапирой просто попал по врагу, можно нанести <code>1d10</code> урона. Если он заранее отвлёк врага, атаковал в уязвимое место и прошёл проверку с большим запасом, <strong>Мастер</strong> может увеличить урон до <code>2d10</code>, добавить кровотечение или вообще позволить моментально убить слабого врага.</p>\n<p><strong>Мастеру</strong> стоит поощрять игроков решать бои творчески: использовать окружение, разговаривать, ставить ловушки, отступать, разделять врагов, ломать снаряжение или менять цель конфликта. Если бой превращается только в обмен ударами, урон всё ещё работает, но система раскрывается хуже.</p>\n<h2 id=\"смерти-персонажей\">Смерти Персонажей</h2>\n<p>Это достаточно индивидуальная тема, но всё же один совет тут можно дать: не стоит делать персонажей не умирающими. Каждый персонаж должен иметь возможность погибнуть хотя бы в каком-то смысле, потому что иначе ценность жизни становится меньше перед Игроками. И про смерть персонажей относится не только к игровым, но и к неигровым.</p>\n<h2 id=\"перед-началом-игры\">Перед началом игры</h2>\n<p>Перед началом партии крайне рекомендуется провести небольшие интервью с каждым из игроков об их персонажах и мире. Возможно, даже отыграть небольшие повествовательные сценки. Так вы поможете своим <strong>Игрокам</strong> прочувствовать и понять <strong>Персонажей</strong> и заодно сможете понять, как вы будете с ними взаимодействовать.</p>\n<h2 id=\"инструменты\">Инструменты</h2>\n<p>Эти инструменты могут помочь с подготовкой и проведением игр:</p>\n<ul><li><a href=\"https://obsidian.md/\">Obsidian</a> - заметки, организация кампании, базы данных и подготовка сессий.</li><li><a href=\"https://watabou.github.io/\">Watabou's Procgen Arcana</a> - генераторы мира, городов, подземелий и локаций.</li><li><a href=\"https://donjon.bin.sh/\">Donjon</a> - генераторы имен, встреч, сокровищ, карт и других материалов для подготовки.</li><li><a href=\"https://tabletopaudio.com/\">Tabletop Audio</a> - фоновая музыка и звуковые панели.</li><li><a href=\"https://roll20.net/\">Roll20</a> - виртуальный стол для карт, токенов, кубиков, листов персонажей и удаленной игры.</li></ul>","headings":[{"level":2,"text":"Сопровождение Игроков","id":"сопровождение-игроков"},{"level":2,"text":"История","id":"история"},{"level":3,"text":"Сеттинг","id":"сеттинг"},{"level":3,"text":"Сюжетная линия","id":"сюжетная-линия"},{"level":3,"text":"Действующие лица","id":"действующие-лица"},{"level":3,"text":"Локации","id":"локации"},{"level":3,"text":"Длительность","id":"длительность"},{"level":2,"text":"Сцены","id":"сцены"},{"level":3,"text":"Типы","id":"типы"},{"level":3,"text":"Правила построения сцен","id":"правила-построения-сцен"},{"level":2,"text":"Импровизация","id":"импровизация"},{"level":2,"text":"Баланс и урон","id":"баланс-и-урон"},{"level":2,"text":"Смерти Персонажей","id":"смерти-персонажей"},{"level":2,"text":"Перед началом игры","id":"перед-началом-игры"},{"level":2,"text":"Инструменты","id":"инструменты"}]},{"title":"Ход игры","source":"rules","key":"rules:ход-игры","slug":"ход-игры","type":"doc","html":"<h1 id=\"ход-игры\">Ход игры</h1>\n<p>Каждую игру стоит начинать <strong>Мастеру Игры</strong>. Он должен провести некую интерлюдию и погрузить <strong>Игроков</strong> в ситуацию. В рамках этой секции игры, <strong>Мастер</strong> также может напомнить, что происходило ранее, если игра идёт в несколько сессий. Хорошим подходом также является попросить одного из <strong>Игроков</strong> рассказать, что произошло в прошлый раз.</p>\n<p>После этого <strong>Игроки</strong> оказываются во вступительной <strong>Сцене</strong> и далее все идёт по цикличному сценарию:</p>\n<ul><li><strong>Игроки</strong> совершают действия</li><li>Происходит реакция на их действия</li><li><strong>Игроки</strong> переходят к следующей <strong>Сцене</strong></li><li>Повторение пока игроки не дойдут до какой-либо финальной <strong>Сцены</strong></li></ul>\n<p><strong>Мастеру</strong> следует готовить последствия действий <strong>Игроков</strong> и способы вернуть игру к напряжению, если сцена начинает разваливаться или терять темп. Не нужно силой вести <strong>Игроков</strong> по одному нужному пути: лучше заранее понимать, какие конфликты, угрозы и возможности могут появиться из их решений. В конце игры <strong>Мастеру</strong> стоит сказать финальные слова, подытоживающие приключение и возможные дальнейшие события, чтобы <strong>Игроки</strong>, даже уходя, продолжали думать о партии.</p>","headings":[]},{"title":"Лист Персонажа","source":"tool","key":"tool:character-sheet","slug":"character-sheet","type":"character-sheet"}]}],"sheets":{"en":{"html":"<main class=\"sheet-shell\">\n    <form id=\"sheet\" autocomplete=\"off\">\n      <div class=\"top-tools\">\n        <button type=\"button\" id=\"toggle-customize\" aria-expanded=\"false\" aria-controls=\"customize-panel\">Customize</button>\n        <button type=\"button\" id=\"clear-sheet\">Clear</button>\n        <button type=\"button\" onclick=\"window.print od\" class=\"stat-mod\"><span class=\"stat-sep\">)</span></div><div class=\"stat-sublabel\"><span>Rank</span><span>Mod</span></div></div>\n              </div>\n              <div class=\"health-block exhaustion-block\">\n                <div class=\"section-label\">Exhaustion</div>\n                <div class=\"health-row exhaustion-score\">\n                  <input type=\"text\" name=\"exhaustion-current\" >\n                  <span style=\"color:var(--sheet-border)\">/</span>\n                  <input type=\"text\" name=\"exhaustion-threshold\" >\n                </div>\n                <div class=\"health-formula exhaustion-formula\" data-exhaustion-formula>Threshold <sub>i</sub> = (5 + max(Body, Mind, Will)) x i</div>\n                <div class=\"exhaustion-note\">\n                  <div><b>0</b> - full strength</div>\n                  <div><b>1</b> - hindrance on checks</div>\n                  <div><b>2</b> - no movement / extra action</div>\n                  <div><b>3</b> - unconscious</div>\n                </div>\n              </div>\n            </div>\n            <div class=\"effects-box\"><div class=\"section-label\">Effects</div><textarea class=\"fit-text\" name=\"effects\" ></textarea></div>\n          </div>\n          <div class=\"middle-col\">\n            <div class=\"grow-section\"><div class=\"section-label\">Traits</div><textarea class=\"fit-text\" name=\"traits\" ></textarea></div>\n            <div class=\"grow-section\"><div class=\"section-label\">Abilities</div><textarea class=\"fit-text\" name=\"abilities\" ></textarea></div>\n          </div>\n          <div class=\"right-col\">\n            <div class=\"combat-section\">\n              <div class=\"section-label\">Combat</div>\n              <div class=\"combat-row\">\n                <div class=\"combat-stat\"><input type=\"text\" name=\"hp-current\" ><div class=\"box-title\">HP</div></div>\n                <div class=\"combat-stat\"><input type=\"text\" name=\"defense-rating\"
