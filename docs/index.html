вий в списке.</li></ol>\n<p>При этом каждое из этих действий, если оно может быть выполнено в течение игрового момента (условной секунды), можно произвести за счёт <strong>Бонусного Действия</strong>.</p>\n<h3 id=\"реакции\">Реакции</h3>\n<p>В чужой ход <strong>Персонаж</strong> может только совершать <strong>Реакции</strong> — защищаться от <strong>Атак</strong> по области, наложения <strong>Эффектов</strong> и прочего взаимодействия с ним самим или окружением рядом. При этом <strong>Реакция</strong> должна укладывать в такие же рамки, что и <strong>Бонусное Действие</strong>. За <strong>Раунд</strong> по умолчанию можно совершить только 1 <strong>Реакцию</strong>. Что может быть конкретно совершенно в рамках Реакции определяется Мастером, а Игроки могут лишь пробовать доказать их возможность совершить то или иное действие.</p>\n<h2 id=\"отдых\">Отдых</h2>\n<p>В течение игры или целой кампании, <strong>Игрокам</strong> нужно совершать отдыхи. <strong>Короткие отдыхи</strong> чаще всего инициируют сами игроки, в то время как <strong>Долгие</strong> происходят чаще всего только между партиями.</p>\n<h3 id=\"короткий-отдых\">Короткий отдых</h3>\n<p>Во время <strong>Короткого отдыха</strong> <strong>Ресурсы</strong> восстанавливаются частично и относительно времени потраченного на отдых, вплоть до половины от максимальных значений.</p>\n<h3 id=\"долгий-отдых\">Долгий отдых</h3>\n<p>Во время <strong>Длительного отдых</strong>, восстанавливаются все <strong>Ресурсы</strong>, и сбрасываются все <strong>Эффекты</strong> и <strong>Истощение</strong>, если про них не сказано обратного. Чаще всего, длительный отдых автоматически происходит между сессиями игр.</p>","headings":[{"level":2,"text":"Мастер и Игрок","id":"мастер-и-игрок"},{"level":2,"text":"Ранги","id":"ранги"},{"level":2,"text":"Персонаж","id":"персонаж"},{"level":3,"text":"Характеристики","id":"характеристики"},{"level":3,"text":"Ранг Персонажа","id":"ранг-персонажа"},{"level":3,"text":"Статы","id":"статы"},{"level":3,"text":"Смерть","id":"смерть"},{"level":3,"text":"Черты","id":"черты"},{"level":3,"text":"Способности","id":"способности"},{"level":3,"text":"Эффекты","id":"эффекты"},{"level":3,"text":"Инвентарь","id":"инвентарь"},{"level":3,"text":"Предметы и оружие","id":"предметы-и-оружие"},{"level":3,"text":"Вдохновение","id":"вдохновение"},{"level":2,"text":"Конфликт","id":"конфликт"},{"level":3,"text":"Сложность","id":"сложность"},{"level":3,"text":"Проверка","id":"проверка"},{"level":3,"text":"Критическая удача и неудача","id":"критическая-удача-и-неудача"},{"level":3,"text":"Преимущества и помехи","id":"преимущества-и-помехи"},{"level":2,"text":"Бой","id":"бой"},{"level":3,"text":"Инициатива","id":"инициатива"},{"level":3,"text":"Ходы","id":"ходы"},{"level":3,"text":"Зоны","id":"зоны"},{"level":3,"text":"Действия","id":"действия"},{"level":3,"text":"Реакции","id":"реакции"},{"level":2,"text":"Отдых","id":"отдых"},{"level":3,"text":"Короткий отдых","id":"короткий-отдых"},{"level":3,"text":"Долгий отдых","id":"долгий-отдых"}]},{"title":"Для игрока","source":"rules","key":"rules:для-игрока","slug":"для-игрока","type":"doc","html":"<h1 id=\"для-игрока\">Для игрока</h1>\n<h2 id=\"создание-персонажа\">Создание персонажа</h2>\n<p>Игрок начинает с создания своего <strong>Персонажа</strong>. Ему нужно определить кем он хочет быть в приключении и понять что он сможет делать в игре. Весь путь создания стоит сопровождать обсуждением с <strong>Мастером</strong>, чтобы ваш персонаж гармонично вписывался в общую картину игры.</p>\n<h3 id=\"идея\">Идея</h3>\n<p>Для начала вам стоит придумать идею персонажа, описать примерные желания, цели и возможности персонажа. Они должны вписываться в сеттинг, который предоставляет <strong>Мастер</strong>.</p>\n<h3 id=\"история\">История</h3>\n<p>После утверждения идеи, нужно прописать предысторию <strong>Персонажа</strong>, чтобы были нарративные обоснования вашей идеи. Степень проработки зависит от распределения ответственности в вашей игре — вы можете лишь сделать наброски истории и попросить <strong>Мастера</strong> дописать всё остальное, а можете углубиться и прописать самому, чтобы <strong>Мастеру</strong> нужно было лишь внести корректировки по необходимости.</p>\n<h3 id=\"механики\">Механики</h3>\n<p>На основе вашей идеи и геймплейных систем мастер вместе с вами должен прописать механики вашего персонажа:</p>\n<ul><li>Харакетристики</li><li>Черты</li><li>Способности</li></ul>\n<h3 id=\"снаряжение\">Снаряжение</h3>\n<p>Скорее всего, ваш персонаж появляется в игре не с пустыми руками, поэтому вам также стоит продумать какой инвентарь у вас может быть на момент начала партии. Также как и с историей, здесь можно как продумывать самому, так и полностью отдать на откуп <strong>Мастеру</strong> (никакой жалости).</p>\n<h2 id=\"прокачка\">Прокачка</h2>\n<p><strong>Прокачка</strong> <strong>Персонажей</strong> происходит по нескольким аспектам:</p>\n<ul><li>Изменение <strong>Характеристик</strong><br>Со временем <strong>Персонажи</strong> могут становиться лучше в тех или иных аспектах, из-за чего их <strong>Характеристик</strong> могут меняться. При этом если она забивают на какие-то аспекты, то <strong>Характеристики</strong> могут падать.</li><li>Увеличение выживаемости<br>Со временем <strong>Персонажи</strong> могут проходить серьёзные испытания, крепнуть и за это <strong>Мастер Игры</strong> может награждать их увеличением <strong>ОЗ</strong>, улучшением <strong>Кости Здоровья</strong>, новой защитной <strong>Чертой</strong> или более сильной <strong>Оболочкой</strong>.</li><li><strong>Черты</strong> и <strong>Способности</strong><br>Во время приключений <strong>Персонажи</strong> могут меняться, проходить различные трансформации или банально осваиваться с каким-то вещами. Из-за этого они могут получать новые черты и способности, увеличивать ранги способностей и черт и т.п.</li><li>Получение новых <strong>Предметов</strong><br>Не менее важным аспектом прокачки является получение различных <strong>Предметов</strong>. <strong>Мастеру Игры</strong> не стоит скупиться на предоставление <strong>Игрокам</strong> возможностей в получении <strong>Предметов</strong> не только общего назначения, но и уникальных артефактов, иногда даже легендарных.</li></ul>\n<h2 id=\"отыгрыш\">Отыгрыш</h2>\n<p>Наверное одним из наиболее важных элементов является отыгрыш персонажа. Даже если вы играете с наибольшим упором на бои, отыгрыш важен везде. Ведь он не только является драматическим элементом, но и основным мостом к погружению в игру и придания ей глубины, смысла и банального веселья. Любая интеракция, любое столкновение или даже небольшой переброс словами может стать в разы привлекательнее если его отыгрывать. Если вам страшно, что вас не поддержат, то знайте, что только после того, как кто-то треснет лёд, он сможет разрушиться и всем станет куда легче также, может не сразу, но понемногу, погружаться, играть не только в кубики, но и в роли (всё таки это РОЛЕВАЯ игра).</p>\n<p>Несколько приёмов, как можно упростить себе отыгрыш:</p>\n<ul><li>Продумайте какой голос у вашего персонажа. Как он может меняться в зависимости от ситуации, какие интонации ваш персонаж может чаще всего использовать.</li><li>Продумайте мимику вашего персонажа, как бы он реагировал на грусть, радость, раздражение и т.д.</li><li>Прочувствуйте историю вашего персонажа — если она небольшая, то додумывайте мелкие детали, фантазируйте.</li></ul>","headings":[{"level":2,"text":"Создание персонажа","id":"создание-персонажа"},{"level":3,"text":"Идея","id":"идея"},{"level":3,"text":"История","id":"история"},{"level":3,"text":"Механики","id":"механики"},{"level":3,"text":"Снаряжение","id":"снаряжение"},{"level":2,"text":"Прокачка","id":"прокачка"},{"level":2,"text":"Отыгрыш","id":"отыгрыш"}]},{"title":"Для мастера","source":"rules","key":"rules:для-мастера","slug":"для-мастера","type":"doc","html":"<h1 id=\"для-мастера\">Для мастера</h1>\n<h2 id=\"сцены\">Сцены</h2>\n<p>Вариации и последовательности игровых событий, необходимых для перехода к следующему этапу приключения.</p>\n<h3 id=\"типы\">Типы</h3>\n<ol><li>Переговоры <br>События посвящены взаимоотношениям <strong>Персонажей</strong> и обмену информацией между ними.</li><li>Исследование <br>События посвящены поиску ресурсов и информации в процессе изучения игрового <strong>Пространства</strong>.</li><li>Бой <br>События посвящены противостоянию <strong>Персонажей</strong> с риском для их <strong>Здоровья</strong>.</li><li>Поход <br>События посвящены перемещению и преодолению препятствий внутри игрового <strong>Пространства</strong>.</li><li>Прятки <br>События посвящены перемещению по игровому <strong>Пространству</strong> с целью избежать обнаружения.</li><li>Интерлюдия <br>События, в которых <strong>Игрок</strong> принимает ограниченное участие или выступает в качестве зрителя.</li><li>Песочница <br>События посвящены свободному взаимодействию с игровым <strong>Пространством</strong>, <strong>Персонажами</strong> и <strong>Ресурсами</strong>.</li></ol>\n<h3 id=\"правила-построения-сцен\">Правила построения сцен</h3>\n<p>В каждой сцене, заранее созданной <strong>Мастером</strong> (сцены, в которые Игроки сами себя затянули не в счёт), должны быть следующие элементы:</p>\n<ul><li><strong>Описание</strong><br>У каждой сцены должно быть описание. Нет нужды полностью расписывать игрокам каждый миллиметр пространства, но точно стоит описывать отличные черты текущей ситуации. Застоялый, тяжёлый запах в комнате с умершим или сладкий, бьющий в нос запах выпивки в таверне — яркие элементы, погружающие в атмосферу и задающие настроение всегда должны сопровождать начало сцены.</li><li><strong>Звук</strong><br>Каждая сцена имеет свой звук и желательно, чтобы во время игры, звук менялся от сцене к сцене, а иногда и во время сцены, сопровождая и поддерживая историю.</li><li><strong>Эмоциональный сдвиг</strong><br>Как и в кино, если во время сцены эмоции не менялись, то эта сцена лишь растягивает время, а не добавляет удовольствия. Это не значит, что каждая сцена должна содержать драму или поворот сюжета — наоборот, сильные потрясения должны чередоваться со слабыми, чтобы поддерживать тонус игры. Добавляйте лёгкие разговоры по душам между тяжёлыми сюжетными перипетиями, позволяйте вашим игрокам расслабляться и веселиться между спасением (или уничтожением) мира.</li><li><strong>Героический момент</strong><br>В каждой сцене хотя бы один из игроков должен иметь возможность себя проявить. Тяжело создавать ситуации, где все в партии могут себя проявить, поэтому неплохо будет давать каждому из Персонажей возможность хотя бы иногда проявить себя. При этом, стоит хотя бы иногда давать возможности нескольким, а желательно и всей партии показывать командную игру.</li><li><strong>Сдвиг</strong><br>Всегда должна быть возможность поменять что-то в сцене. Либо от действий игроков либо от осознаваемых ими событий (например, таймер). Сцена должна уметь приходить в динамику, чтобы сдвигаться с места и также двигать повествование.</li><li><strong>Визуальное сопровождение</strong><br><em>опционально, но крайне рекомендуется</em><br>Не для каждой сцены можно подобрать хорошую картинку передающую полноту ситуации, но как минимум, всегда можно подобрать хотя бы отдалённое абстрактное изображение, за которое игроки смогут зацепиться глазом и достроить остальное на основе вашего описания.</li></ul>\n<h2 id=\"история\">История</h2>\n<p>Продумывание и подготовка истории игры может быть очень долгим и трудоёмким процессом, но оно того стоит. Перед началом игры продумайте сеттинг, сюжеты и персонажей. Продумайте их переплетения, возможные ходы сюжета и всё это запишите и структурируйте, чтобы проще было потом возвращаться. Вам необязательно придумывать всё с нуля — адаптируйте уже существующие истории, миры или персонажей. Перед началом кампейна также крайне рекомендует продумать — какую историю вы хотите рассказать и какие есть варианты её завершения. Не стоит оттягивать продумывание финала до последнего момента. Хотя бы в общих чертах, но описать каркас истории стоит до начала игр.</p>\n<h2 id=\"баланс-и-урон\">Баланс и урон</h2>\n<p>Балансировать бои и урон сложно, особенно в свободной системе. <strong>Мастер</strong> может спокойно адаптировать оружие, броню, урон, здоровье и особенности врагов из других НРИ, если это помогает быстрее подготовить игру. Нет нужды каждый раз выстраивать новую математическую модель.</p>\n<p>Главная идея остаётся той же: простота важнее жёсткой формулы. Урон нужен не только для вычитания чисел из <strong>ОЗ</strong>, но и для того, чтобы показать, насколько хорошо <strong>Персонаж</strong> справился с ситуацией. Хорошая атака может нанести больше урона, сломать защиту, выбить оружие, сбить врага с ног или создать преимущество для союзника.</p>\n<p>При расчёте урона можно отталкиваться от рангов:</p>\n<ul><li>слабое или неподходящее оружие: <code>1d6</code> или меньше</li><li>обычное боевое оружие: <code>1d10</code></li><li>хорошее оружие или удачная ситуация: <code>2d10</code></li><li>сильная способность, тяжёлое оружие или явное преимущество: <code>3d10</code> и больше</li></ul>\n<p>Например, если <strong>Персонаж</strong> с рапирой просто попал по врагу, можно нанести <code>1d10</code> урона. Если он заранее отвлёк врага, атаковал в уязвимое место и прошёл проверку с большим запасом, <strong>Мастер</strong> может увеличить урон до <code>2d10</code>, добавить кровотечение или вообще позволить моментально убить слабого врага.</p>\n<p><strong>Мастеру</strong> стоит поощрять игроков решать бои творчески: использовать окружение, разговаривать, ставить ловушки, отступать, разделять врагов, ломать снаряжение или менять цель конфликта. Если бой превращается только в обмен ударами, урон всё ещё работает, но система раскрывается хуже.</p>\n<h2 id=\"сопровождение-игроков\">Сопровождение Игроков</h2>\n<p>На протяжении подготовки к партии, вам стоит оказывать всяческое содействие и помощь вашим <strong>Игрокам</strong>, чтобы им было комфортно и они не были обескуражены количеством лора или механик. Старайтесь упростить им жизнь, но в то же время не ограничивайте их в желаниях. Даже если они хотят обладать божественными силами — позвольте им иметь крупицу этих возможностей и дайте им задаток на то, что в игре они смогут развиться и получить желанную силу. Разные люди по разному могут относиться ко отдельным аспектам игры, поэтому всегда стоит искать индивидуальный подход и создавать комфортную среду вокруг самой игры (внутри правила уже другие...).</p>\n<p>Такое же сопровождение стоит оказывать и уже во время партии (между сессиями), обсуждать с игроками, что им нравится, что не нравится, рассуждать на темы, которые их интересуют и фантазировать с ними на тему будущего их персонажей.</p>\n<h2 id=\"импровизация\">Импровизация</h2>\n<p>Ваши игроки с большой вероятностью вести себя не так, как вы рассчитывали, и поэтому вы будете оказываться в ситуациях, которые не продумывали заранее. В таких случаях, наиболее корректным советом является не &quot;бороться с течением&quot;, а позволить ему вас направлять. Рассуждайте о необычных действиях <strong>Игроков</strong> как о новых возможностях. Нет нужды постоянно тянуть их на ваши рельсы сюжета, ведь их всегда можно туда вернуть, но просто более долгим путём.</p>\n<p>Тем не менее, не стесняйтесь давать игрокам взбучку (в рамках игры, конечно же), если они начинают совсем уж бездельничать и заниматься абсолютно бредовыми вещами.</p>\n<h2 id=\"перед-началом\">Перед началом</h2>\n<p>Перед началом партии, крайне рекомендуется провести небольшие интервью с каждым из игроков об их персонажах и мире. Возможно, даже отыграть небольшие повествовательные сценки. Так вы поможете своим <strong>Игрокам</strong> прочувствовать и понять <strong>Персонажей</strong> и заодно дать себе возможность понять как вы будете с ними взаимодействовать.</p>\n<h2 id=\"смерти-персонажей\">Смерти Персонажей</h2>\n<p>Это достаточно индивидуальная тема, но всё же один совет тут можно дать: не стоит делать персонажей не умирающими. Каждый персонаж должен иметь возможность погибнуть хотя бы в каком-то смысле, потому что иначе ценность жизни становится меньше перед Игроками. И про смерть персонажей относится не только к игровым, но и к неигровым.</p>","headings":[{"level":2,"text":"Сцены","id":"сцены"},{"level":3,"text":"Типы","id":"типы"},{"level":3,"text":"Правила построения сцен","id":"правила-построения-сцен"},{"level":2,"text":"История","id":"история"},{"level":2,"text":"Баланс и урон","id":"баланс-и-урон"},{"level":2,"text":"Сопровождение Игроков","id":"сопровождение-игроков"},{"level":2,"text":"Импровизация","id":"импровизация"},{"level":2,"text":"Перед началом","id":"перед-началом"},{"level":2,"text":"Смерти Персонажей","id":"смерти-персонажей"}]},{"title":"Ход игры","source":"rules","key":"rules:ход-игры","slug":"ход-игры","type":"doc","html":"<h1 id=\"ход-игры\">Ход игры</h1>\n<p>Каждую игру стоит начинать <strong>Мастеру Игры</strong>. Он должен провести некую интерлюдию и погрузить <strong>Игроков</strong> в ситуацию. В рамках этой секции игры, <strong>Мастер</strong> также может напомнить, что происходило ранее, если игра идёт в несколько сессий. Хорошим подходом также является попросить одного из <strong>Игроков</strong> рассказать, что произошло в прошлый раз.</p>\n<p>После этого <strong>Игроки</strong> оказываются во вступительной <strong>Сцене</strong> и далее все идёт по цикличному сценарию:</p>\n<ul><li><strong>Игроки</strong> совершают действия</li><li>Происходит реакция на их действия</li><li><strong>Игроки</strong> переходят к следующей <strong>Сцене</strong></li><li>Повторение пока игроки не дойдут до какой-либо финальной <strong>Сцены</strong></li></ul>\n<p><strong>Мастеру</strong> следует готовить последствия действий <strong>Игроков</strong> и способы вернуть игру к напряжению, если сцена начинает разваливаться или терять темп. Не нужно силой вести <strong>Игроков</strong> по одному нужному пути: лучше заранее понимать, какие конфликты, угрозы и возможности могут появиться из их решений. В конце игры, <strong>Мастеру</strong> стоит сказать финальные слова подытоживающие приключение и возможные дальнейшие события, чтобы <strong>Игроки</strong> даже уходя продолжали думать о партии.</p>","headings":[]},{"title":"Лист Персонажа","source":"tool","key":"tool:character-sheet","slug":"character-sheet","type":"character-sheet"}]}],"sheets":{"en":{"html":"<main class=\"sheet-shell\">\n    <form id=\"sheet\" autocomplete=\"off\">\n      <div class=\"top-tools\">\n        <button type=\"button\" id=\"clear-sheet\">Clear</button>\n        <button type=\"button\" onclick=\"window.print()\">Print</button>\n      </div>\n      <section class=\"page\">\n        <div class=\"sheet-header\">\n          <div class=\"header-title\">Character Sheet</div>\n          <div class=\"portrait-wrap\">\n            <div class=\"portrait-box\" id=\"portrait-box\" role=\"button\" tabindex=\"0\" aria-label=\"Upload portrait\">\n              <img id=\"portrait-img\" alt=\"\">\n              <div class=\"portrait-placeholder\" id=\"portrait-hint\">Click to upload</div>\n            </div>\n            <input type=\"file\" id=\"portrait-input\" accept=\"image/*\">\n          </div>\n          <div class=\"header-main\">\n            <div class=\"header-top\">\n              <div class=\"charname-row\"><label>Name</label><input type=\"text\" name=\"charname\" ></div>\n              <div class=\"rank-badge\"><label>Rank</label><input type=\"text\" name=\"rank\" ></div>\n            </div>\n            <div class=\"header-meta\">\n              <div class=\"field\"><input type=\"text\" name=\"player\" ><label>Player</label></div>\n              <div class=\"field\"><input type=\"text\" name=\"campaign\" ><label>Campaign</label></div>\n              <div class=\"field\"><input type=\"text\" name=\"archetype\" ><label>Archetype / role</label></div>\n            </div>\n            <div><div class=\"section-label\">Description</div><textarea class=\"fit-text\"
